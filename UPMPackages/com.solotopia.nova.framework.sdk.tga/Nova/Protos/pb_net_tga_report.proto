syntax = "proto3";

package NovaFramework.SDK.TGAPlugin.Runtime;

import "pb_net_header.proto";

// 上报 TGA 标识请求（登录成功或 SDK 就绪后调用，只更新非空字段）
message PbNetReportTGAReq {
    NovaFramework.Runtime.PbNetReqHeader head = 1;  // 请求公共头
    string tga_distinct_id = 2;  // ThinkingData 访客 ID
    string tga_account_id = 3;   // ThinkingData 账号 ID
}

// 上报 TGA 标识响应
message PbNetReportTGAResp {
    NovaFramework.Runtime.PbNetRespHeader head = 1;  // 响应公共头
}
